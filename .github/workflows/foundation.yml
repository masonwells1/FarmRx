name: Farm Rx foundation gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run foundation gate
        shell: pwsh
        run: ./scripts/verify-foundation.ps1
      - name: Upload browser evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
