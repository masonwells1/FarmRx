<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>html,body,.tradingview-widget-container,.tradingview-widget-container__widget{width:100%;height:100%;margin:0;overflow:hidden}body{background:#fff}</style>
  </head>
  <body>
    <div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>
    <script>(()=>{const allowed=new Set(['CBOT:ZC1!','CBOT:ZS1!','CBOT:ZW1!','CBOT:ZCZ2026','CBOT:ZSX2026','CBOT:ZWN2027']);const symbol=new URLSearchParams(location.search).get('symbol');if(!symbol||!allowed.has(symbol)){document.body.textContent='Quote unavailable.';return}const loader=document.createElement('script');loader.src='https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';loader.async=true;loader.text=JSON.stringify({symbol,width:'100%',height:220,locale:'en',dateRange:'1D',colorTheme:'light',isTransparent:true,autosize:true,largeChartUrl:''});document.querySelector('.tradingview-widget-container').append(loader)})()</script>
  </body>
</html>
